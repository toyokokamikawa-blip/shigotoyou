<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0f172a" />
  <meta name="description" content="契約書電子承認システム - 従業員用アプリ" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="契約承認" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+JP:wght@400;500;600;700&display=swap"
    rel="stylesheet" />
  <title>契約書電子承認</title>
</head>

<body>
  <script>
    window.addEventListener('error', function (event) {
      document.body.innerHTML += '<div style="color:red; background:white; padding:10px; z-index:9999; position:absolute; top:0; left:0;">JS Error: ' + event.message + ' at ' + event.filename + ':' + event.lineno + '</div>';
    });
    window.addEventListener('unhandledrejection', function (event) {
      document.body.innerHTML += '<div style="color:red; background:white; padding:10px; z-index:9999; position:absolute; top:50px; left:0;">Unhandled Promise: ' + event.reason + '</div>';
    });
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function (registrations) {
        for (let registration of registrations) {
          registration.unregister();
          console.log('Service Worker unregistered.');
        }
      });
    }
  </script>
  <div id="app"></div>
  <script type="module" src="/src/main.js"></script>
</body>

</html>
